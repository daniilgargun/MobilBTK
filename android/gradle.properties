org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Отключаем инкрементальную компиляцию Kotlin для решения проблемы с разными дисками на Windows
kotlin.incremental=false
# Используем абсолютные пути для кэша Kotlin
kotlin.daemon.jvmargs=-Dkotlin.daemon.jvm.options=-Xmx2g
